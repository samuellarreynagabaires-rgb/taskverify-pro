<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Cumplimiento con Firebase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Firebase SDK modular -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // Configuración desde variable global del entorno
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { /* Añadir config aquí si se prueba localmente */ };
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let tasks = [];
    let currentUser = null;

    // Inicializar autenticación
    signInAnonymously(auth).then(() => {
        console.log("Autenticación anónima exitosa");
    });

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            setupFirestoreListener(user.uid);
        }
    });

    function setupFirestoreListener(uid) {
        // Siguiendo la regla de rutas: /artifacts/{appId}/users/{userId}/tasks
        const tasksRef = collection(db, 'artifacts', appId, 'users', uid, 'tasks');
        
        onSnapshot(tasksRef, (snapshot) => {
            tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTasks();
        }, (error) => {
            console.error("Error al escuchar Firestore:", error);
        });
    }

    // Funciones para manipular datos
    window.addTask = async (taskData) => {
        if (!currentUser) return;
        const tasksRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
        await addDoc(tasksRef, { ...taskData, createdAt: new Date() });
    };

    window.updateTaskStatus = async (taskId, status) => {
        if (!currentUser) return;
        const taskRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', taskId);
        await updateDoc(taskRef, { status: status });
    };

    function renderTasks() {
        const container = document.getElementById('task-container');
        container.innerHTML = tasks.map(task => `
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800">${task.title || 'Sin título'}</h3>
                <p class="text-sm text-slate-600">${task.description || ''}</p>
                <div class="mt-4 flex gap-2">
                    <button onclick="updateTaskStatus('${task.id}', 'completado')" class="bg-green-500 text-white px-3 py-1 rounded">Completar</button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }
  </script>
</head>
<body class="bg-slate-50 p-6">
  <div id="task-container" class="grid gap-4">
    <!-- Aquí se inyectarán las tareas -->
  </div>
</body>
</html>
